# Tag-driven crates.io publish — lockstep release of every framework crate in
# the workspace under the `nest-rs-*` prefix. Apps and product crates carry
# `publish = false` in their Cargo.toml so they're skipped automatically.
#
# Trigger: push a tag matching `v*.*.*` (e.g. `v0.1.1`). The job verifies the
# tag matches the workspace `version` in `Cargo.toml`, runs `cargo check`, then
# `cargo publish --workspace --no-verify` (topological order, skips
# `publish = false`).
#
# `--no-verify` is required for the lockstep bump: the verify pass resolves each
# crate's internal deps (pinned `= <version>`) against the crates.io index,
# where the new version doesn't exist yet — so it fails the co-publish with
# "candidate versions found which didn't match". Skipping verify lets cargo
# upload in dependency order and wait for the index between crates. Compile
# coverage is already provided by the `cargo check --workspace` step above.
#
# Required repo secret: `CRATES_IO_TOKEN` (Settings → Secrets → Actions).
# Generate the token at https://crates.io/me with scope `publish-new` +
# `publish-update`, scoped to the `nest-rs-*` package prefix.

name: Publish — crates.io

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: publish-crates-io
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.95'

      # .cargo/config.toml selects mold on Linux for faster local/devcontainer
      # links; install it here too or gcc fails with "cannot find 'ld'".
      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      - name: Verify tag matches workspace version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ws_version=$(awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' Cargo.toml)
          echo "tag=$tag  ws_version=$ws_version"
          if [ "$tag" != "$ws_version" ]; then
            echo "::error::Tag v$tag does not match workspace version $ws_version in Cargo.toml"
            exit 1
          fi

      - name: cargo check (workspace)
        run: cargo check --workspace --all-targets

      - name: cargo publish --workspace
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --workspace --no-verify
