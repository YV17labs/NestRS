# Tag-driven crates.io publish — lockstep release of every framework crate in
# the workspace under the `nest-rs-*` prefix. Apps and product crates carry
# `publish = false` in their Cargo.toml so they're skipped automatically.
#
# Trigger: push a tag matching `v*.*.*` (e.g. `v0.1.0`). The job verifies the
# tag matches the workspace `version` in `Cargo.toml` and runs
# `cargo publish --workspace`, which Cargo (≥ 1.91) orders topologically:
# `nest-rs-codegen` and the proc-macro crates first, then the libs that
# depend on them, the umbrella last.
#
# Required repo secret: `CRATES_IO_TOKEN` (Settings → Secrets → Actions).
# Generate the token at https://crates.io/me with scope `publish-new` +
# `publish-update`, scoped to the `nest-rs-*` package prefix.

name: Publish — crates.io

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: publish-crates-io
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.95'

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-publish-

      - name: Verify tag matches workspace version
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          ws_version=$(awk -F'"' '/^version[[:space:]]*=/ {print $2; exit}' Cargo.toml)
          echo "tag=$tag  ws_version=$ws_version"
          if [ "$tag" != "$ws_version" ]; then
            echo "::error::Tag v$tag does not match workspace version $ws_version in Cargo.toml"
            exit 1
          fi

      - name: cargo check (workspace)
        run: cargo check --workspace --all-targets

      - name: cargo publish --workspace
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --workspace
