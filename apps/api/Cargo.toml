[package]
name = "api"
version = "0.1.0"
edition.workspace = true
publish = false

[dependencies]
nestrs-core.workspace = true
nestrs-authn.workspace = true
nestrs-config.workspace = true
nestrs-authz.workspace = true
nestrs-authz-http.workspace = true
nestrs-authz-graphql.workspace = true
nestrs-authz-ws.workspace = true
nestrs-graphql.workspace = true
nestrs-health.workspace = true
nestrs-http.workspace = true
nestrs-middleware.workspace = true
nestrs-openapi.workspace = true
nestrs-database.workspace = true
nestrs-resource.workspace = true
nestrs-server-timing.workspace = true
nestrs-telemetry = { workspace = true, features = ["http"] }
nestrs-ws.workspace = true
identity.workspace = true
poem.workspace = true
tokio.workspace = true
tracing.workspace = true
serde.workspace = true
schemars.workspace = true
async-graphql.workspace = true
anyhow.workspace = true
thiserror.workspace = true
validator.workspace = true
uuid.workspace = true
sea-orm.workspace = true
serde_json.workspace = true

[dev-dependencies]
# `test` enables poem's in-process TestClient, used to drive the mounted
# endpoints without binding a socket.
poem = { workspace = true, features = ["test"] }
# `telemetry` satisfies the TelemetryModule boot guard; `orm` provides the
# throwaway Postgres database fixture.
nestrs-testing = { workspace = true, features = ["telemetry", "orm"] }
# The e2e migrates the throwaway database with the same migrations production
# uses; `db` carries the `Migrator`.
db = { path = "../db" }
# The WebSocket e2e drives the gateway over a real socket (the in-process
# TestClient cannot perform an upgrade), authenticated with a bearer header.
futures-util.workspace = true
tokio-tungstenite = "0.27"

[lints]
workspace = true
