[package]
name = "nest-rs-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Model Context Protocol server support for NestRS — wraps the rmcp SDK behind the NestRS DI container and exposes a poem endpoint."
keywords = ["framework", "nestjs", "mcp", "rmcp", "ai"]
categories = ["web-programming", "api-bindings"]

[dependencies]
nest-rs-core.workspace = true
nest-rs-mcp-macros.workspace = true
poem.workspace = true
rmcp.workspace = true
schemars.workspace = true
# `task_local!` installs the per-operation `RequestScope` around the inner rmcp
# endpoint so tool methods reach it via `Scoped<T>`.
tokio.workspace = true
# Deny-all fallback and its boot warning log a security misconfig through
# the framework's tracing (span target `nest_rs::mcp`).
tracing.workspace = true

[dev-dependencies]
nest-rs-core = { path = "../nest-rs-core" }
nest-rs-http = { path = "../nest-rs-http" }
# The fallback-guard tests drive `use_guards_global` onto `/mcp` through
# `GlobalPoolMcpGuard`, which lives behind guards' `mcp` feature. Dev-dep cycle
# (guards/mcp depends on this crate) is allowed by Cargo, same as
# nest-rs-graphql ↔ nest-rs-guards.
nest-rs-guards = { path = "../nest-rs-guards", features = ["mcp"] }
# A real `ThrottlerGuard` in the global pool proves the fallback carries a
# non-authn guard's `429` — the behaviour `/mcp` could not have before.
nest-rs-throttler = { path = "../nest-rs-throttler" }
nest-rs-testing = { path = "../nest-rs-testing" }
poem = { workspace = true, features = ["test"] }
serde_json = { workspace = true }

[lints]
workspace = true
