[package]
name = "nest-rs-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Model Context Protocol server support for nestrs — wraps the rmcp SDK behind the nestrs DI container and exposes a poem endpoint."


[dependencies]
nest-rs-core.workspace = true
nest-rs-mcp-macros.workspace = true
poem.workspace = true
rmcp.workspace = true
schemars.workspace = true
# Deny-all fallback and its boot warning log a security misconfig through
# the framework's tracing (span target `nest_rs::mcp`).
tracing.workspace = true

[dev-dependencies]
nest-rs-core = { path = "../nest-rs-core" }
nest-rs-http = { path = "../nest-rs-http" }
nest-rs-testing = { path = "../nest-rs-testing" }
poem = { workspace = true, features = ["test"] }
tokio.workspace = true

[lints]
workspace = true
