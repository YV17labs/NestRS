[package]
name = "nest-rs-openapi"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "OpenAPI 3.0 document generation and bundled Swagger UI for nestrs HTTP controllers (the REST analog of nest-rs-graphql's GraphqlModule)."


[dependencies]
nest-rs-core.workspace = true
# `OpenApiModule` owns its `#[config]` `OpenApiConfig` (namespace `openapi`),
# loaded from `NESTRS_OPENAPI__*`; serde + validator back its derives.
nest-rs-config.workspace = true
serde.workspace = true
validator.workspace = true
# OpenApiModule self-mounts over HTTP via HttpEndpointMeta and reads the
# discovered HttpControllerMeta — the same pattern GraphqlModule uses. No cycle:
# nest-rs-http does not depend on us.
nest-rs-http.workspace = true
poem.workspace = true
# Generates the component schemas from the `Json<T>` payload types `#[routes]`
# captured. `openapi3()` settings emit `$ref`s at `#/components/schemas/...`.
schemars.workspace = true
serde_json.workspace = true
