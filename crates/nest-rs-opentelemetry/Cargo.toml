[package]
name = "nest-rs-opentelemetry"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "OpenTelemetry for NestRS: logs, traces, metrics, W3C propagation, OTLP export."
keywords = ["framework", "nestjs", "opentelemetry", "tracing", "otlp"]
categories = ["development-tools::debugging", "asynchronous"]


[features]
# OTLP exporter is default so a dev who sets NESTRS_OPENTELEMETRY__OTLP_ENDPOINT
# gets traces out of the box. The HTTP interceptor is opt-in (`http`), not default:
# an HTTP app adds `features = ["http"]`, while a headless app (a queue worker)
# inherits the bare default and never compiles poem / nest-rs-http. (Opt-in, not
# default-off, because a workspace member cannot disable an inherited default —
# `default-features` is honoured only on the `[workspace.dependencies]` entry.)
default = ["otlp"]
# The per-request HTTP interceptor (tracing span, X-Trace-Id, access log) and
# its poem / nest-rs-http deps. Requires `otlp`: the interceptor reads the trace
# id off the OTel span, so the whole interceptor body is otel-backed — there is
# no useful interceptor without it. (A headless app uses `otlp` *without* `http`,
# so it still skips poem; only the inverse is meaningless.)
http = [
    "otlp",
    "dep:nest-rs-http",
    "dep:nest-rs-interceptors",
    "dep:poem",
    "dep:bytes",
    "dep:futures-core",
]
otlp = [
    "dep:opentelemetry",
    "dep:opentelemetry_sdk",
    "dep:opentelemetry-otlp",
    "dep:opentelemetry-http",
    "dep:opentelemetry-semantic-conventions",
    "dep:opentelemetry-appender-tracing",
    "dep:tracing-opentelemetry",
    "dep:uuid",
]

[dependencies]
nest-rs-core.workspace = true
nest-rs-config.workspace = true
nest-rs-http = { workspace = true, optional = true }
nest-rs-interceptors = { workspace = true, optional = true }
poem = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
futures-core = { workspace = true, optional = true }
tracing.workspace = true
tracing-subscriber.workspace = true
tokio.workspace = true
thiserror.workspace = true
async-trait.workspace = true

opentelemetry = { workspace = true, optional = true }
opentelemetry_sdk = { workspace = true, optional = true }
opentelemetry-otlp = { workspace = true, optional = true }
opentelemetry-http = { workspace = true, optional = true }
opentelemetry-semantic-conventions = { workspace = true, optional = true }
opentelemetry-appender-tracing = { workspace = true, optional = true }
tracing-opentelemetry = { workspace = true, optional = true }
uuid = { workspace = true, optional = true }

[dev-dependencies]
# `OpenTelemetryConfig::from_env` reads `NESTRS_OPENTELEMETRY__*` off the process
# env; the tests isolate it with `figment::Jail`, matching how `nest-rs-config`
# tests its env reads.
figment = { workspace = true, features = ["test"] }

[lints]
workspace = true
