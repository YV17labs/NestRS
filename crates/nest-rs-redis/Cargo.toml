[package]
name = "nest-rs-redis"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Redis-backed queue integration for nest-rs-queue (via apalis-redis): the QueueConnection producer, the QueueWorker consumer transport, and the #[processor] decorator re-export. The user-facing storage is Redis; apalis is an implementation detail."
keywords = ["framework", "nestjs", "redis", "queue", "apalis"]
categories = ["asynchronous", "database"]


[dependencies]
nest-rs-core.workspace = true
# The abstractions: `Job`, `Processor`, `ProcessMethod`, the `JobProducer`
# seam, and (re-exported through it) the `#[processor]` macro. Application
# code reaches both this crate's Redis types AND the abstractions through
# the same import root by depending on `nest-rs-queue` + `nest-rs-redis`.
nest-rs-queue.workspace = true
# `QueueModule` owns its `#[config]` `QueueConfig` (namespace `queue`), loaded
# from `NESTRS_QUEUE__*`; `validator` backs its `#[validate]` rules.
nest-rs-config.workspace = true
validator.workspace = true
async-trait.workspace = true
anyhow.workspace = true
# Typed `RedisError` for the Redis backend (the producer surface speaks
# `nest_rs_queue::QueueError`); framework crates surface `thiserror`, not `anyhow`.
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
tokio-util.workspace = true
tracing.workspace = true
apalis = { workspace = true, features = ["retry", "timeout", "catch-panic"] }
apalis-redis.workspace = true
# `throttler` feature only: the shared `dyn ThrottlerStore` seam + config types
# reused verbatim (the guard is transport-agnostic; only the backing store
# changes), running the atomic fixed-window Lua script over
# `QueueConnection::manager()`.
nest-rs-throttler = { workspace = true, optional = true }
# The user-facing Redis surface (`RedisError`, `aio::ConnectionManager`) is
# named through the `redis` crate directly — apalis-redis only re-exports these
# types, and the promise is "apalis types never leak". Unconditional: already
# in the tree via apalis-redis (same 0.32 workspace pin, so one connection
# type); the direct dep costs nothing.
redis = { workspace = true }

[features]
# A second Redis use — a cross-process rate-limit store — as a feature on this
# one integration home, per the crate's future-expansion note. Off by default:
# producer/consumer apps that never rate-limit don't pull `nest-rs-throttler`.
throttler = ["dep:nest-rs-throttler"]

[dev-dependencies]
# Self dev-dependency: turn on the `throttler` feature for this crate's own test
# targets, so the `[[test]] e2e` target's `required-features` below are
# satisfied under `cargo nextest run --workspace -E 'binary(e2e)'`. Without it
# the live-Redis suite is skipped in silence rather than run. Dev-deps do not
# propagate, and a path-only dev-dep is stripped from the published manifest, so
# a producer-only consumer still pulls neither `redis` nor `nest-rs-throttler`.
nest-rs-redis = { path = ".", features = ["throttler"] }
nest-rs-core = { path = "../nest-rs-core" }
# The `#[processor]` macro emits `::nest_rs_worker::*` paths and the test
# implements `JobContext` directly.
nest-rs-worker = { path = "../nest-rs-worker" }
# Per-argument pipe on a `#[process]` job argument (`Piped<P, T>` / `Valid<T>`).
nest-rs-pipes = { path = "../nest-rs-pipes" }
# The live-Redis `e2e` binary names `Throttle`/`ThrottlerStore` to drive the
# `RedisThrottler` store directly. Path-only (intra-workspace dev-dep) and only
# built when the `throttler` feature is on — see the `[[test]]` below.
nest-rs-throttler = { path = "../nest-rs-throttler" }
tokio.workspace = true
tokio-util.workspace = true
async-trait.workspace = true
tower.workspace = true

# The `e2e` binary exercises the `RedisThrottler`, which only exists under the
# `throttler` feature — so the target is skipped entirely unless that feature is
# on (`cargo nextest run -p nest-rs-redis --features throttler -E 'binary(e2e)'`).
# `tests/integration/main.rs` stays auto-discovered.
[[test]]
name = "e2e"
path = "tests/e2e/main.rs"
required-features = ["throttler"]

[lints]
workspace = true
