[package]
name = "nest-rs-resource-macros"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Internal — the #[expose] attribute (SeaORM entity to GraphQL + OpenAPI); re-exported by nest-rs-resource, not a direct dependency."

[features]
graphql = []

[lib]
proc-macro = true

[dependencies]
# `extra-traits` supplies the `PartialEq`/`Eq`/`Debug` impls for `syn` types
# (`Path`, `Ident`) that `attr::RelationKind` derives. Workspace feature
# unification hides the need in a full build, but the crate must declare it to
# compile standalone (e.g. `cargo publish` verify, docs.rs).
syn = { workspace = true, features = ["extra-traits"] }
quote.workspace = true
proc-macro2.workspace = true
nest-rs-codegen.workspace = true
