[package]
name = "nest-rs-resource"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Expose a SeaORM entity to REST/OpenAPI (wire DTO) from one declaration, via the #[expose] attribute; optional GraphQL surface with the `graphql` flag + feature."
keywords = ["framework", "nestjs", "seaorm", "crud", "graphql"]
categories = ["web-programming", "database"]

[features]
default = []
graphql = [
    "dep:async-graphql",
    "dep:nest-rs-graphql",
    "nest-rs-resource-macros/graphql",
]

[dependencies]
nest-rs-resource-macros.workspace = true
async-graphql = { workspace = true, optional = true }
nest-rs-graphql = { workspace = true, optional = true }
sea-orm.workspace = true
serde_json.workspace = true
# Re-exported for `#[expose]`-generated code (lifecycle impl, loader logs) so
# the consuming crate needs no direct dep on either.
async-trait.workspace = true
tracing.workspace = true

[dev-dependencies]
# `#[expose]` emits `::serde::`/`::schemars::`/`::validator::` paths that resolve
# in the *consuming* crate, so this crate needs them only to compile its own
# test fixtures — never as a dependency it imposes on consumers.
serde.workspace = true
schemars.workspace = true
# Path-only, never `.workspace = true`: `nest-rs-seaorm` depends back on this
# crate, so a versioned dev-edge would form a member cycle no publish order can
# satisfy. Cargo strips a versionless dev-dep from the published manifest.
nest-rs-seaorm = { path = "../nest-rs-seaorm" }
sea-orm.workspace = true
uuid.workspace = true
validator.workspace = true

[lints]
workspace = true
