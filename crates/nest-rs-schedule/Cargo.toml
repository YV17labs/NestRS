[package]
name = "nest-rs-schedule"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Discovered cron-style scheduled jobs for nestrs: the #[scheduled] decorator plus a ScheduleModule that auto-attaches the Scheduler."
keywords = ["framework", "nestjs", "cron", "scheduler", "jobs"]
categories = ["asynchronous"]


[dependencies]
nest-rs-core.workspace = true
nest-rs-worker.workspace = true
nest-rs-schedule-macros.workspace = true
async-trait.workspace = true
anyhow.workspace = true
tokio.workspace = true
tokio-util.workspace = true
# FutureExt::catch_unwind isolates a panicking `fire` so one bad job never
# silently kills its schedule (mirrors the queue's CatchPanicLayer).
futures-util.workspace = true
tracing.workspace = true
croner.workspace = true
chrono.workspace = true
chrono-tz.workspace = true

[dev-dependencies]
# Raising SIGINT to exercise App::run's graceful-shutdown path end-to-end.
libc = "0.2"
