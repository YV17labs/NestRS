[package]
name = "nest-rs-seaorm"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "SeaORM integration for nestrs: the first-class implementation of the `nest-rs-database` extension contract. `DatabaseModule::for_root` owns the connection, composed at `App::builder()`. Transport extractors (`Bind`, `LoaderScope`, `WsDataContext`) live behind Cargo features."
keywords = ["framework", "nestjs", "seaorm", "database", "orm"]
categories = ["database"]


[features]
default = []
# HTTP transport extractor: `Bind<S, A>` (poem extractor that loads + authorizes
# through `CrudService::access`). Poem is already in the base deps; `uuid` is
# pulled here because `Bind` validates UUID v7 path ids. `nest-rs-authz/http`
# is forwarded because `src/http/shape.rs` uses `nest_rs_authz::http`; without
# it, building this feature in isolation (or via `full`) fails to resolve that
# module (it otherwise only compiles under workspace feature unification).
http = ["dep:uuid", "dep:nest-rs-resource", "nest-rs-authz/http"]
# GraphQL transport extractors: the `bind` resolver helper and `LoaderScope`
# (the `BatchContext` that re-installs the request executor + ability around
# each `#[dataloader]` batch).
graphql = ["dep:async-graphql", "dep:nest-rs-graphql", "dep:uuid"]
# WebSocket transport extractor: `WsDataContext` (the `SocketContext` that
# re-installs the request executor + ability around each gateway message).
ws = ["dep:nest-rs-ws"]
# MCP transport extractor: `McpDataContext` (the `McpToolContext` that
# re-installs the request executor + ability inside each tool dispatch).
mcp = ["dep:nest-rs-mcp"]
# Liveness/readiness pool ping (`DbHealthIndicator`) wired through
# `nest-rs-health`'s `#[indicators]` registry. The connection's `ping`
# round-trips a `SELECT 1`, so an unreachable DB drops the readiness probe
# to `503`.
health = ["dep:nest-rs-health"]
# Convenience for tests and exemplars.
full = ["http", "graphql", "ws", "mcp", "health"]

[dependencies]
nest-rs-core.workspace = true
# `WorkerDbContext` bridges the framework's worker seam (`JobContext`) to install
# the pool executor around every scheduler tick / queue job. The trait lives in
# `nest-rs-worker` so neither scheduler nor queue has to depend on the other.
nest-rs-worker.workspace = true
# The ORM-agnostic ambient executor + scope seam. SeaORM's `Executor` enum
# in this crate implements `nest_rs_database::Executor`; the task-local plumbing
# lives in `nest-rs-database` so a third-party ORM can reuse it.
nest-rs-database.workspace = true
# `DatabaseModule` owns its `#[config]` `DatabaseConfig` (namespace `database`),
# loaded from `NESTRS_DATABASE__*`; `validator` backs its `#[validate]` rules.
nest-rs-config.workspace = true
validator.workspace = true
# `Repo` auto-applies the caller's row-level filter, read from the ambient
# `Ability` (`condition_for`); the ambient `Ability` itself lives in nest-rs-authz.
nest-rs-authz.workspace = true
# The request boundary that installs the ambient executor (and opens a
# transaction per mutating request) is an HTTP interceptor.
nest-rs-http.workspace = true
nest-rs-interceptors.workspace = true
poem.workspace = true
sea-orm = { workspace = true, features = ["with-chrono"] }
chrono.workspace = true
# `PageParams` (the `?first&after` cursor query) derives `Deserialize` so the
# generated `#[crud]` list handler can read it with poem's `Query<…>`.
serde.workspace = true
# `ServiceError`'s RFC-9457 `problem+json` rendering serializes `validator`
# field errors into an `errors` extension member.
serde_json.workspace = true
# `PageParams` derives `JsonSchema` so the `#[crud]` list op's `Query<PageParams>`
# can advertise its `first`/`after` cursor as OpenAPI query parameters.
schemars.workspace = true
anyhow.workspace = true
async-trait.workspace = true
thiserror.workspace = true
tracing.workspace = true
# The ambient executor is carried in a `tokio::task_local!`.
tokio.workspace = true

# Optional deps for transport-binding features.
uuid = { workspace = true, optional = true }
nest-rs-resource = { workspace = true, optional = true }
async-graphql = { workspace = true, optional = true }
nest-rs-graphql = { workspace = true, optional = true }
nest-rs-ws = { workspace = true, optional = true }
nest-rs-mcp = { workspace = true, optional = true }
nest-rs-health = { workspace = true, optional = true }

[dev-dependencies]
# Self dev-dependency: turn on every transport binding for this crate's own test
# targets. Without it `cargo nextest run --workspace` builds this crate with
# `default = []`, the `[[test]] e2e` target's `required-features` below are
# never satisfied, and the whole Postgres suite is skipped in silence — the
# opposite of what the Definition of done's `-E 'binary(e2e)'` step reads as.
# Dev-deps do not propagate, so no consumer gains a feature from this, and a
# path-only dev-dep is stripped from the published manifest.
nest-rs-seaorm = { path = ".", features = ["full"] }

# The e2e suite imports feature-gated transport bridges: `DbContext` (`http`)
# and `WsDataContext` (`ws`). Without this gate, a default-feature
# `cargo test -p nest-rs-seaorm` fails to compile the test binary (E0432).
# The `ws` module inside `tests/e2e/ws.rs` stays additionally `#[cfg]`-gated.
[[test]]
name = "e2e"
required-features = ["http", "ws"]

[lints]
workspace = true
