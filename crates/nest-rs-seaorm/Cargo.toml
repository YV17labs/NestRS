[package]
name = "nest-rs-seaorm"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "SeaORM integration for nestrs: the first-class implementation of the `nest-rs-database` extension contract. `DatabaseModule::for_root` owns the connection, composed at `App::builder()`. Transport extractors (`Bind`, `LoaderScope`, `WsDataContext`) live behind Cargo features."


[features]
default = []
# HTTP transport extractor: `Bind<S, A>` (poem extractor that loads + authorizes
# through `CrudService::access`). Poem is already in the base deps; `uuid` is
# pulled here because `Bind` validates UUID v7 path ids.
http = ["dep:uuid"]
# GraphQL transport extractors: the `bind` resolver helper and `LoaderScope`
# (the `BatchContext` that re-installs the request executor + ability around
# each `#[dataloader]` batch).
graphql = ["dep:async-graphql", "dep:nest-rs-graphql", "dep:uuid"]
# WebSocket transport extractor: `WsDataContext` (the `SocketContext` that
# re-installs the request executor + ability around each gateway message).
ws = ["dep:nest-rs-ws"]
# Liveness/readiness pool ping (`DbHealthIndicator`) wired through
# `nest-rs-health`'s `#[indicators]` registry. The connection's `ping`
# round-trips a `SELECT 1`, so an unreachable DB drops the readiness probe
# to `503`.
health = ["dep:nest-rs-health"]
# Convenience for tests and exemplars.
full = ["http", "graphql", "ws", "health"]

[dependencies]
nest-rs-core.workspace = true
# The ORM-agnostic ambient executor + scope seam. SeaORM's `Executor` enum
# in this crate implements `nest_rs_database::Executor`; the task-local plumbing
# lives in `nest-rs-database` so a third-party ORM can reuse it.
nest-rs-database.workspace = true
# `DatabaseModule` owns its `#[config]` `DatabaseConfig` (namespace `database`),
# loaded from `NESTRS_DATABASE__*`; `validator` backs its `#[validate]` rules.
nest-rs-config.workspace = true
validator.workspace = true
# `Repo` auto-applies the caller's row-level filter, read from the ambient
# `Ability` (`condition_for`); the ambient `Ability` itself lives in nest-rs-authz.
nest-rs-authz.workspace = true
# The request boundary that installs the ambient executor (and opens a
# transaction per mutating request) is an HTTP interceptor.
nest-rs-http.workspace = true
nest-rs-middleware.workspace = true
poem.workspace = true
sea-orm.workspace = true
# `PageParams` (the `?first&after` cursor query) derives `Deserialize` so the
# generated `#[crud]` list handler can read it with poem's `Query<…>`.
serde.workspace = true
anyhow.workspace = true
async-trait.workspace = true
thiserror.workspace = true
tracing.workspace = true
# The ambient executor is carried in a `tokio::task_local!`.
tokio.workspace = true

# Optional deps for transport-binding features.
uuid = { workspace = true, optional = true }
async-graphql = { workspace = true, optional = true }
nest-rs-graphql = { workspace = true, optional = true }
nest-rs-ws = { workspace = true, optional = true }
nest-rs-health = { workspace = true, optional = true }
