[package]
name = "nest-rs-testing"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "In-process testing harness for NestRS: boot an app's real DI graph and drive its HTTP/GraphQL/MCP surfaces with poem's TestClient, with provider overrides and no socket bound."
keywords = ["framework", "nestjs", "testing", "test", "harness"]
categories = ["development-tools::testing"]


[features]
# Satisfy the OpenTelemetryModule boot guard in tests (`with_test_telemetry`).
opentelemetry = ["dep:nest-rs-opentelemetry"]
# An ephemeral, migrated Postgres database fixture for e2e (`EphemeralDatabase`).
orm = ["dep:sea-orm", "dep:sea-orm-migration"]

[dependencies]
nest-rs-core.workspace = true
# The `ws_gateway_guards` test drives `GuardAsWsMessageCheck` (guards' WS
# message-guard path, feature-gated). Enabling `guards/ws` forwards `ws` to the
# filter/interceptor layer crates too, so the cross-crate WS wiring test builds
# under default features (not only `--all-features`).
nest-rs-guards = { workspace = true, features = ["ws"] }
nest-rs-http.workspace = true
nest-rs-interceptors.workspace = true
nest-rs-filters.workspace = true
nest-rs-exception-filters.workspace = true
# `#[routes]` / `#[controller]` macros emit `::tracing::warn!` for
# dedup-skip diagnostics; the call-site crate needs it in scope.
tracing.workspace = true
anyhow.workspace = true
# `test` adds poem's in-process TestClient; `tower-compat` comes from the
# workspace default and is harmless here.
poem = { workspace = true, features = ["test"] }
# A headless app drives non-HTTP transports on a cancellable background task.
tokio.workspace = true
tokio-util.workspace = true
# Every e2e boot loads the project's `.env` via `load_project_env` â€” normal dep.
nest-rs-config.workspace = true
# The MCP helpers (`mcp::call_tool`) build JSON-RPC messages; no `nest-rs-mcp`
# dependency needed, the protocol is JSON over the `TestClient`.
serde_json.workspace = true
# Opt-in fixtures: OpenTelemetry (boot guard) and a throwaway database for e2e.
nest-rs-opentelemetry = { workspace = true, optional = true }
sea-orm = { workspace = true, optional = true }
sea-orm-migration = { workspace = true, optional = true }

[dev-dependencies]
# `transport_parity` boots one module serving both `Exempt`-edge transports to
# pin that they answer one app wiring identically. That is cross-crate wiring
# (guards' fallbacks Ă— graphql Ă— mcp), so it lives here rather than in any
# single surface crate â€” and dev-deps let it enable the two fallback features
# without them reaching a consumer of the harness.
nest-rs-guards = { path = "../nest-rs-guards", features = ["graphql", "mcp"] }
nest-rs-graphql = { path = "../nest-rs-graphql" }
nest-rs-mcp = { path = "../nest-rs-mcp" }
# A crate defining a `#[resolver]` / an `#[mcp]` tool host needs these directly:
# the generated code names `async_graphql::` and `rmcp::` paths.
async-graphql.workspace = true
rmcp.workspace = true
tokio.workspace = true
# The config DI test boots a module wiring `ConfigModule::for_feature` and a
# service injecting the loaded config; `nest-rs-config` is already a normal
# dependency. serde + validator back the `#[config]` struct's derives.
serde.workspace = true
validator.workspace = true
# The pipes test (`tests/pipes.rs`) needs the `GlobalPipe` trait + a
# `serde_json::Value` body to observe a pipe rewriting it.
nest-rs-pipes = { path = "../nest-rs-pipes" }
# The exception-filters test (`tests/exception_filters.rs`) needs the
# trait + a typed error to throw and catch.
thiserror.workspace = true
async-trait.workspace = true
# The WS gateway-guard dedup test (`tests/ws_gateway_guards.rs`) drives a
# `#[gateway]` + `#[messages]` impl, so it needs the macros + `WsModule`.
nest-rs-ws = { path = "../nest-rs-ws" }
