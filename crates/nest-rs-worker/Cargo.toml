[package]
name = "nest-rs-worker"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Worker-execution primitives for nestrs — the ambient-context seam every transport that runs jobs off the request path (schedulers, queue workers, stream consumers) plugs into."


[dependencies]
# The trait surface is pure std (Future + Pin + Arc); no async-runtime dep —
# Tokio only enters the picture in the test binaries, where it drives the seam.
# `tracing` is the one runtime dependency: a broken `JobContext::scope` impl
# (one that returns without running the job) is surfaced as a structured error
# event so the failure is diagnosable rather than a bare panic string.
tracing.workspace = true

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt"] }

[lints]
workspace = true
