[package]
name = "nest-rs-ws"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "WebSocket gateways for nestrs: the #[gateway]/#[subscribe_message] decorators self-mount on the HTTP transport, built on poem's WebSocket upgrade."


[dependencies]
nest-rs-core.workspace = true
# `WsConfig` follows the framework dual-path config rule (`NESTRS_WS__*` env +
# pinned struct via `WsModule::for_root`) — the socket-lifetime ceiling lives here.
nest-rs-config.workspace = true
# The gateway self-mounts as an HttpEndpointMeta (the upgrade is an HTTP GET),
# so it rides the existing HTTP transport — reusing its guards, CORS, port and
# TLS — rather than opening a second server.
nest-rs-http.workspace = true
nest-rs-ws-macros.workspace = true
# `websocket` is a non-default poem feature; enabling it here turns it on for the
# whole build (Cargo features are additive).
poem = { workspace = true, features = ["websocket"] }
serde = { workspace = true }
serde_json.workspace = true
# Global pipes over a message's `data` (`transform_ws_data`), bridged from
# `use_pipes_global` via the `WsDataPipe` seeded fn pointer.
nest-rs-pipes.workspace = true
async-trait.workspace = true
# `StreamExt`/`SinkExt` to split and drive poem's `WebSocketStream`: the connection
# loop reads while a spawned writer task drains the per-connection outbox.
futures-util.workspace = true
# `tokio::spawn` for the writer task and `mpsc` for the per-connection outbox the
# registry pushes through.
tokio = { workspace = true }
tracing.workspace = true
# Connection registry lock — parking_lot for poison-free, panic-free locking.
parking_lot.workspace = true
# `#[derive(Validate)]` on `WsConfig` — the `Config` trait bounds it (empty
# validation today, but the field maps are the framework's config contract).
validator.workspace = true

[dev-dependencies]
# The `#[messages]` macro emits `::nest_rs_guards::*` for the Layer-System
# chain (global + per-message guard dedup). nest-rs-guards depends on
# nest-rs-ws at the lib level, so this stays a dev-only edge. The `ws` feature
# is needed for `GuardAsWsMessageCheck` in `tests/ws.rs` — without it, building
# this crate in isolation (`cargo test -p nest-rs-ws`) fails to compile that
# test (it only worked under workspace feature-unification before).
nest-rs-guards = { path = "../nest-rs-guards", features = ["ws"] }

[lints]
workspace = true
