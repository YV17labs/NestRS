[package]
name = "nest-rs"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "NestRS framework umbrella — re-exports the core and the surface crates an app reaches for, with a `prelude` for the common case."
keywords = ["framework", "nestjs", "web", "backend", "async"]
categories = ["web-programming", "asynchronous"]


[features]
default = ["http", "config"]

http = ["dep:nest-rs-http"]
config = ["dep:nest-rs-config"]
database = ["dep:nest-rs-database"]
seaorm = ["dep:nest-rs-seaorm", "database"]
# `nest-rs-authz?/graphql` (weak dep feature): when an app pulls both `graphql`
# and `authz` through the umbrella, activate authz's GraphQL binding — which
# transitively turns on the `graphql` feature of the Layer System trait crates
# (guards / filters / exception-filters / interceptors). No effect unless
# `authz` is also enabled, so an HTTP-only build never compiles the GraphQL
# stack via this edge.
graphql = ["dep:nest-rs-graphql", "http", "nest-rs-authz?/graphql"]
# Likewise for WS: the gateway reuses the HTTP guards, so authz's WS binding
# lives behind its `http` feature (which forwards `nest-rs-guards/ws`).
ws = ["dep:nest-rs-ws", "http", "nest-rs-authz?/http"]
# Likewise for MCP: authz's MCP binding forwards `nest-rs-guards/mcp`, which is
# what seeds the in-band global-pool fallback on `/mcp`.
mcp = ["dep:nest-rs-mcp", "http", "nest-rs-authz?/mcp"]
queue = ["dep:nest-rs-queue"]
redis = ["dep:nest-rs-redis", "queue"]
schedule = ["dep:nest-rs-schedule"]
events = ["dep:nest-rs-events"]
authn = ["dep:nest-rs-authn"]
authz = ["dep:nest-rs-authz"]
social = ["dep:nest-rs-social", "authn"]
opentelemetry = ["dep:nest-rs-opentelemetry"]
openapi = ["dep:nest-rs-openapi", "http"]
health = ["dep:nest-rs-health", "http"]
throttler = ["dep:nest-rs-throttler", "http"]
server-timing = ["dep:nest-rs-server-timing", "http"]
testing = ["dep:nest-rs-testing"]
# Layer-System extension-point crates. Writing a custom `Guard` (the mandated
# authz posture), `Pipe`, `Interceptor`, `Filter` or `ExceptionFilter` — or a
# `#[resource]`/worker provider — should not force a direct per-crate dep
# (FACADE-I11).
guards = ["dep:nest-rs-guards"]
pipes = ["dep:nest-rs-pipes"]
interceptors = ["dep:nest-rs-interceptors"]
filters = ["dep:nest-rs-filters"]
exception-filters = ["dep:nest-rs-exception-filters"]
resource = ["dep:nest-rs-resource"]
worker = ["dep:nest-rs-worker"]
storage = ["dep:nest-rs-storage"]

[dependencies]
nest-rs-core.workspace = true

nest-rs-http = { workspace = true, optional = true }
nest-rs-config = { workspace = true, optional = true }
nest-rs-database = { workspace = true, optional = true }
nest-rs-seaorm = { workspace = true, optional = true }
nest-rs-graphql = { workspace = true, optional = true }
nest-rs-ws = { workspace = true, optional = true }
nest-rs-mcp = { workspace = true, optional = true }
nest-rs-queue = { workspace = true, optional = true }
nest-rs-redis = { workspace = true, optional = true }
nest-rs-schedule = { workspace = true, optional = true }
nest-rs-events = { workspace = true, optional = true }
nest-rs-authn = { workspace = true, optional = true }
nest-rs-authz = { workspace = true, optional = true }
nest-rs-social = { workspace = true, optional = true }
nest-rs-opentelemetry = { workspace = true, optional = true }
nest-rs-openapi = { workspace = true, optional = true }
nest-rs-health = { workspace = true, optional = true }
nest-rs-throttler = { workspace = true, optional = true }
nest-rs-server-timing = { workspace = true, optional = true }
nest-rs-testing = { workspace = true, optional = true }
nest-rs-guards = { workspace = true, optional = true }
nest-rs-pipes = { workspace = true, optional = true }
nest-rs-interceptors = { workspace = true, optional = true }
nest-rs-filters = { workspace = true, optional = true }
nest-rs-exception-filters = { workspace = true, optional = true }
nest-rs-resource = { workspace = true, optional = true }
nest-rs-worker = { workspace = true, optional = true }
nest-rs-storage = { workspace = true, optional = true }

[lints]
workspace = true
