[package]
name = "nestrs-authz"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "CASL-style authorization for nestrs: one ability definition driving an access gate, a SeaORM query pre-filter, and response field-masking."

[dependencies]
# A rule's condition lowers to `sea_orm::Condition`; in-memory checks read
# columns via `ModelTrait::get`.
sea-orm.workspace = true
# Response masking serializes a model then strips disallowed keys. (The poem
# binding of this engine lives in `nestrs-authz-http`.)
serde.workspace = true
serde_json.workspace = true
# The ambient request `Ability` is carried in a `tokio::task_local!`.
tokio.workspace = true

[dev-dependencies]
# `tests/ability.rs` builds a throwaway SeaORM entity and renders
# `condition_for` to SQL; the masking tests serialize a model via serde.
sea-orm.workspace = true
serde.workspace = true
