[package]
name = "nestrs-config"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Configuration loading for nestrs apps — the @nestjs/config analog (env + TOML via figment)."

[dependencies]
figment.workspace = true
serde.workspace = true
thiserror.workspace = true
# `load_validated` runs declarative `#[validate(...)]` checks on a config struct
# after loading — the same `validator` the HTTP `ValidationPipe` uses.
validator.workspace = true
# `ConfigModule::for_feature` queues a config-loading factory on the container,
# so this crate reaches into the kernel. The reverse never holds — `nestrs-core`
# does not depend on `nestrs-config`, so there is no cycle (and figment stays out
# of the kernel, the reason this crate exists separately).
nestrs-core.workspace = true
# `anyhow::Error` is the factory's error type (a failed load aborts the boot).
anyhow.workspace = true
# Re-exported `#[config]` decorator. A `*-macros` crate emits absolute-path
# tokens, so it never depends back on this surface crate.
nestrs-config-macros.workspace = true

[dev-dependencies]
# Only the extra `test` feature for `figment::Jail`; `serde` is already a normal dep.
figment = { workspace = true, features = ["test"] }
