[package]
name = "nestrs-database"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
description = "SeaORM database module for nestrs: DatabaseModule::for_root owns the connection, composed at App::builder(). Transport extractors (`Bind`, `LoaderScope`, `WsDataContext`) live behind Cargo features."

[features]
default = []
# HTTP transport extractor: `Bind<S, A>` (poem extractor that loads + authorizes
# through `CrudService::access`). Poem is already in the base deps; `uuid` is
# pulled here because `Bind` validates UUID v7 path ids.
http = ["dep:uuid"]
# GraphQL transport extractors: the `bind` resolver helper and `LoaderScope`
# (the `BatchContext` that re-installs the request executor + ability around
# each `#[dataloader]` batch).
graphql = ["dep:async-graphql", "dep:nestrs-graphql", "dep:uuid"]
# WebSocket transport extractor: `WsDataContext` (the `SocketContext` that
# re-installs the request executor + ability around each gateway message).
ws = ["dep:nestrs-ws"]
# Liveness/readiness pool ping (`DbHealthIndicator`) wired through
# `nestrs-health`'s `#[indicators]` registry. The connection's `ping`
# round-trips a `SELECT 1`, so an unreachable DB drops the readiness probe
# to `503`.
health = ["dep:nestrs-health"]
# Convenience for tests and exemplars.
full = ["http", "graphql", "ws", "health"]

[dependencies]
nestrs-core.workspace = true
# `DatabaseModule` owns its `#[config]` `DatabaseConfig` (namespace `database`),
# loaded from `NESTRS_DATABASE__*`; `validator` backs its `#[validate]` rules.
nestrs-config.workspace = true
validator.workspace = true
# `Repo` auto-applies the caller's row-level filter, read from the ambient
# `Ability` (`condition_for`); the ambient `Ability` itself lives in nestrs-authz.
nestrs-authz.workspace = true
# The request boundary that installs the ambient executor (and opens a
# transaction per mutating request) is an HTTP interceptor.
nestrs-http.workspace = true
nestrs-middleware.workspace = true
poem.workspace = true
sea-orm.workspace = true
# `PageParams` (the `?first&after` cursor query) derives `Deserialize` so the
# generated `#[crud]` list handler can read it with poem's `Query<…>`.
serde.workspace = true
anyhow.workspace = true
async-trait.workspace = true
tracing.workspace = true
# The ambient executor is carried in a `tokio::task_local!`.
tokio.workspace = true

# Optional deps for transport-binding features.
uuid = { workspace = true, optional = true }
async-graphql = { workspace = true, optional = true }
nestrs-graphql = { workspace = true, optional = true }
nestrs-ws = { workspace = true, optional = true }
nestrs-health = { workspace = true, optional = true }
