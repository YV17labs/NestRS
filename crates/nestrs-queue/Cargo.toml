[package]
name = "nestrs-queue"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
description = "Discovered Redis-backed job queues for nestrs: the #[processor] decorator, a Queue producer handle, and a QueueWorker transport, built on apalis."

[dependencies]
nestrs-core.workspace = true
nestrs-queue-macros.workspace = true
# `QueueModule` owns its `#[config]` `QueueConfig` (namespace `queue`), loaded
# from `NESTRS_QUEUE__*`; `validator` backs its `#[validate]` rules.
nestrs-config.workspace = true
validator.workspace = true
async-trait.workspace = true
anyhow.workspace = true
serde.workspace = true
tokio.workspace = true
tokio-util.workspace = true
tracing.workspace = true
apalis = { workspace = true, features = ["retry", "timeout", "catch-panic"] }
apalis-redis.workspace = true

[dev-dependencies]
nestrs-core.workspace = true
tokio.workspace = true
tokio-util.workspace = true
async-trait.workspace = true
