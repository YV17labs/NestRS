input CreateOrg {
	name: String!
}

input CreateUser {
	email: String!
	name: String!
}

type Mutation {
	createOrg(input: CreateOrg!): Org!
	createUser(input: CreateUser!): User!
	deleteOrg(id: String!): Boolean!
	deleteUser(id: String!): Boolean!
	"""
	Transition a draft to published. Row-gated for `Update` through
	`CrudService::access`, exactly like the generated by-id operations, so a
	caller can only publish a post its ability reaches. The service emits
	`PostPublishedEvent` on success — see the `notifications` slice.
	"""
	publishPost(id: String!): Post
	updateOrg(id: String!, input: UpdateOrg!): Org
	updateUser(id: String!, input: UpdateUser!): User
}

type Org {
	createdAt: String!
	id: String!
	name: String!
	posts: [Post!]!
	updatedAt: String!
	users: [User!]!
}

type Post {
	author: User
	authorId: String!
	body: String!
	createdAt: String!
	id: String!
	org: Org
	orgId: String!
	status: PostStatus!
	title: String!
	updatedAt: String!
}

"""
Publication state of a post, backed by the `status` string column. `Draft`
is the state a freshly created post lands in; `publishPost` transitions it
to `Published`, which is when subscribers are notified.
"""
enum PostStatus {
	DRAFT
	PUBLISHED
}

type Query {
	org(id: String!): Org
	orgs(after: String, first: Int): [Org!]!
	post(id: String!): Post
	posts(after: String, first: Int): [Post!]!
	user(id: String!): User
	users(after: String, first: Int): [User!]!
}

input UpdateOrg {
	name: String!
}

input UpdateUser {
	email: String!
	name: String!
}

type User {
	createdAt: String!
	email: String!
	id: String!
	name: String!
	org: Org
	orgId: String!
	posts: [Post!]!
	updatedAt: String!
}

"""
Directs the executor to include this field or fragment only when the `if` argument is true.
"""
directive @include(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
"""
Directs the executor to skip this field or fragment when the `if` argument is true.
"""
directive @skip(if: Boolean!) on FIELD | FRAGMENT_SPREAD | INLINE_FRAGMENT
schema {
	query: Query
	mutation: Mutation
}
