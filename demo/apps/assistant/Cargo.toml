[package]
name = "assistant"
version.workspace = true
edition.workspace = true
publish = false

[dependencies]
features.workspace = true
nest-rs-config.workspace = true
nest-rs-core.workspace = true
nest-rs-health.workspace = true
nest-rs-http.workspace = true
# `QueueModule::for_root` seeds the queue connection the audio port injects.
nest-rs-redis.workspace = true
nest-rs-seaorm.workspace = true
nest-rs-server-timing.workspace = true
nest-rs-opentelemetry = { workspace = true, features = ["http"] }
tokio.workspace = true
anyhow.workspace = true

[dev-dependencies]
# Enables `features::testing` (dev keypair, org id, token minting) for e2e.
features = { workspace = true, features = ["test-support"] }
nest-rs-authn.workspace = true
nest-rs-storage.workspace = true
nest-rs-testing = { workspace = true, features = ["opentelemetry", "orm"] }
migrations = { workspace = true }
sea-orm.workspace = true
poem.workspace = true
reqwest.workspace = true
serde_json.workspace = true
uuid.workspace = true

[lints]
workspace = true
