[package]
name = "worker"
version.workspace = true
edition.workspace = true
publish = false

[dependencies]
nest-rs-core.workspace = true
nest-rs-config.workspace = true
nest-rs-health.workspace = true
nest-rs-http.workspace = true
nest-rs-redis.workspace = true
nest-rs-seaorm.workspace = true
# `http` feature: the worker mounts an HTTP transport (health, port 3005), so
# the per-request OTel interceptor must exist in a standalone build too — not
# only when feature-unified with api/live in a workspace build.
nest-rs-opentelemetry = { workspace = true, features = ["http"] }
features.workspace = true
tokio.workspace = true
anyhow.workspace = true

[dev-dependencies]
nest-rs-testing = { workspace = true, features = ["opentelemetry"] }
# The e2e test defines its own `#[processor]`/`#[queue]` types and drives
# `JobProducerExt::push_to` — the binary itself only consumes the queue via
# `nest_rs_redis::QueueModule`, so the abstractions crate is test-only here.
nest-rs-queue.workspace = true
# `#[processor]` in the e2e test emits absolute `::nest_rs_worker::*` paths.
nest-rs-worker.workspace = true
serde.workspace = true

[lints]
workspace = true
