[package]
name = "features"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false
description = "The product's feature library — vertical slices as port + adapter modules (entities, services, controllers, resolvers, gateways). Each feature exposes a core module plus per-transport edge modules; apps compose by listing the edges they serve."

[dependencies]
nest-rs-core.workspace = true
# `#[processor]` (audio queue) emits absolute `::nest_rs_worker::*` paths.
nest-rs-worker.workspace = true
nest-rs-seaorm = { workspace = true, features = ["http", "graphql", "ws"] }
nest-rs-authn.workspace = true
nest-rs-authz = { workspace = true, features = ["http", "graphql", "mcp"] }
nest-rs-config.workspace = true
nest-rs-events.workspace = true
nest-rs-exception-filters.workspace = true
nest-rs-graphql.workspace = true
nest-rs-guards = { workspace = true, features = ["graphql"] }
nest-rs-http.workspace = true
nest-rs-interceptors.workspace = true
nest-rs-mcp.workspace = true
# The rmcp `#[tool_router]`/`#[tool_handler]` macros (re-exported by
# nest-rs-mcp) expand to `rmcp::` paths, so a crate hosting an MCP tool needs
# the crate in scope directly.
rmcp.workspace = true
nest-rs-pipes.workspace = true
nest-rs-queue.workspace = true
nest-rs-redis.workspace = true
nest-rs-schedule.workspace = true
nest-rs-social.workspace = true
nest-rs-storage.workspace = true
nest-rs-throttler.workspace = true
nest-rs-ws.workspace = true
nest-rs-resource = { workspace = true, features = ["graphql"] }
async-graphql.workspace = true
async-trait.workspace = true
# The audio streaming download proxies object storage's chunk stream
# (`futures_util::Stream` of `bytes::Bytes`) into a streamed poem body.
bytes.workspace = true
futures-util.workspace = true
poem.workspace = true
tokio.workspace = true
sea-orm.workspace = true
chrono.workspace = true
serde.workspace = true
serde_json.workspace = true
schemars.workspace = true
uuid.workspace = true
validator.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true

[features]
# Dev-only e2e helpers (`features::testing`): the dev keypair, the seeded org
# id, and Claims token minting. Enabled from the app suites' dev-dependencies;
# never on in a production build.
test-support = []

[dev-dependencies]
# Enables `features::testing` for this crate's own e2e suite.
features = { path = ".", features = ["test-support"] }
tokio.workspace = true
nest-rs-http.workspace = true
nest-rs-opentelemetry = { workspace = true, features = ["http"] }
nest-rs-testing = { workspace = true, features = ["orm", "opentelemetry"] }
nest-rs-authn.workspace = true
nest-rs-social.workspace = true
poem = { workspace = true, features = ["test"] }
serde_json.workspace = true
nest-rs-authz.workspace = true
nest-rs-seaorm.workspace = true
async-graphql.workspace = true
sea-orm.workspace = true
uuid.workspace = true
migrations = { workspace = true }

[lints]
workspace = true
